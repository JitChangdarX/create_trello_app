<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trello – Sign In</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/signin.css" />
  </head>
  <body>
    <header>
      <a href="#" class="logo">
        <div class="logo__icon">
          <span class="logo__bar logo__bar--tall"></span>
          <span class="logo__bar logo__bar--short"></span>
        </div>
        <span class="logo__name">Trello</span>
      </a>
      <div class="header__nav">
        <a href="#" class="header__btn header__btn--ghost">Sign up</a>
        <a href="#" class="header__btn header__btn--white"
          >Get Trello for free</a
        >
      </div>
    </header>

    <main>
      <div class="card">
        <!-- Icon -->
        <div class="card__icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>

        <h1 class="card__title">Log in to Trello</h1>
        <p class="card__sub">Welcome back! Enter your details to continue.</p>

        <div class="form__group">
          <label class="form__label" for="email">Email</label>
          <input
            type="email"
            id="email"
            class="form__input"
            placeholder="Enter your email"
            required
          />
          <div id="email_error" class="error-msg"></div>
        </div>

        <div class="form__group">
          <div class="label-row">
            <label class="form__label" for="password">Password</label>
            <a href="#" class="forgot">Forgot password?</a>
          </div>
          <div class="input-eye">
            <input
              type="password"
              id="password"
              class="form__input"
              placeholder="Enter your password"
              required
            />
            <button
              class="eye-btn"
              onclick="togglePassword()"
              type="button"
              aria-label="Toggle password"
            >
              <svg
                id="eye-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div id="pass_error" class="error-msg"></div>
        </div>

        <button class="btn-submit" onclick="signin()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
          Log In
        </button>

        <div class="switch">
          <p class="switch__text">
            Don't have an account?
            <a href="#" class="switch__link">Sign up for free</a>
          </p>
        </div>
      </div>
    </main>

    <footer>
      <ul class="footer__links">
        <li><a href="#">Privacy Policy</a></li>
        <li><a href="#">Terms of Service</a></li>
        <li><a href="#">Copyright © 2024 Atlassian</a></li>
      </ul>
    </footer>

    <script>
      function togglePassword() {
        const input = document.getElementById("password");
        const icon = document.getElementById("eye-icon");
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        icon.innerHTML = show
          ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
          : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }

      async function signin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const emailInput = document.getElementById("email");
        const passInput = document.getElementById("password");
        const emailErr = document.getElementById("email_error");
        const passErr = document.getElementById("pass_error");
        const btn = document.querySelector(".btn-submit");

        // Reset
        [emailErr, passErr].forEach((e) => {
          e.textContent = "";
          e.classList.remove("visible");
        });
        [emailInput, passInput].forEach((i) => i.classList.remove("error"));

        let valid = true;

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          emailErr.textContent = "Please enter a valid email address.";
          emailErr.classList.add("visible");
          emailInput.classList.add("error");
          valid = false;
        }

        if (password.length < 1) {
          passErr.textContent = "Please enter your password.";
          passErr.classList.add("visible");
          passInput.classList.add("error");
          valid = false;
        }

        if (!valid) return;

        btn.disabled = true;
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="animation:spin 0.7s linear infinite;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Logging in...`;

        try {
          const res = await fetch("http://localhost:4000/signin", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (res.ok && data.token) {
            localStorage.setItem("username", data.token);
            window.location.href = "/dashboard";
          } else {
            emailErr.textContent = "Invalid email or password.";
            emailErr.classList.add("visible");
            emailInput.classList.add("error");
            passInput.classList.add("error");
            btn.disabled = false;
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Log In`;
          }
        } catch {
          btn.disabled = false;
          btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Log In`;
        }
      }
    </script>
  </body>
</html>
